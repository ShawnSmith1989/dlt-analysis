name: Auto Update Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'

permissions:
  contents: write

concurrency:
  group: auto-update-lottery-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update lottery data
        run: node update_data.js

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet -- data.js dlt_all.txt; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js dlt_all.txt
          git commit -m "chore: auto update lottery data"

      - name: Push updated data
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: git push
