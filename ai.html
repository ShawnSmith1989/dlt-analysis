<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能号码生成器 - 大乐透</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --light-bg: #f8f9fa;
            --border-color: #dee2e6;
            --blue-color: #3498db;
            --black-color: #2c3e50;
            --red-color: #e74c3c;
            --yellow-color: #f39c12;
            --green-color: #2ecc71;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: var(--light-bg);
            color: var(--secondary-color);
        }
        
        .filter-container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            margin-right: 10px;
            color: var(--primary-color);
        }
        
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
        
        .result-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .result-ball {
            display: inline-flex;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 5px;
            line-height: 50px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounceIn 0.6s ease-out;
            justify-content: center;
            align-items: center;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .result-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .element-analysis {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .element-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .element-badge .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .btn-generate {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4);
        }
        
        .btn-copy {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .btn-copy:hover {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        
        .loading-spinner {
            display: none;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .disclaimer {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px 20px;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #856404;
        }
        
        .disclaimer i {
            margin-right: 8px;
        }
        
        .collapsible-header {
            cursor: pointer;
            user-select: none;
        }
        
        .collapsible-header::after {
            content: '\F282';
            font-family: 'bootstrap-icons';
            margin-left: 10px;
            transition: transform 0.3s ease;
        }
        
        .collapsible-header.collapsed::after {
            transform: rotate(-180deg);
        }
        
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .collapsible-content.show {
            max-height: 500px;
        }
        
        .color-water { background-color: var(--blue-color); }
        .color-metal { background-color: var(--black-color); }
        .color-fire { background-color: var(--red-color); }
        .color-earth { background-color: var(--yellow-color); }
        .color-wood { background-color: var(--green-color); }
        
        .text-water { color: var(--blue-color); }
        .text-metal { color: var(--black-color); }
        .text-fire { color: var(--red-color); }
        .text-earth { color: var(--yellow-color); }
        .text-wood { color: var(--green-color); }
        
        .footer {
            margin-top: 50px;
            padding: 20px 0;
            background-color: var(--secondary-color);
            color: white;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .result-ball {
                width: 40px;
                height: 40px;
                line-height: 40px;
                font-size: 14px;
            }
            
            .filter-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));">
        <div class="container">
            <ul class="nav nav-pills mx-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="index.html">
                        <i class="bi bi-table"></i> 数据分析表
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="chart.html">
                        <i class="bi bi-graph-up"></i> 区间分布折线图
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active text-white" href="ai.html">
                        <i class="bi bi-magic"></i> AI号码生成
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="ai_alchemy.html">
                        <i class="bi bi-fire"></i> 炼金术
                    </a>
                </li>
            </ul>
        </div>
    </nav>
    
    <div class="container py-4">
        <div class="text-center mb-4">
            <h2><i class="bi bi-magic text-primary"></i> AI智能号码生成器</h2>
            <p class="text-muted">基于五行理论的个性化号码推荐系统</p>
        </div>
        
        <div class="filter-container">
            <form id="aiForm">
                <div class="row">
                    <div class="col-lg-6 mb-4">
                        <div class="section-title">
                            <i class="bi bi-clock"></i> 时间信息
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="hour" class="form-label">时间点（小时）</label>
                                <input type="number" class="form-control" id="hour" min="0" max="23" value="">
                                <small class="text-muted">0-23时，自动获取当前时间</small>
                            </div>
                            <div class="col-6">
                                <label class="form-label">对应时辰</label>
                                <div id="shichenDisplay" class="form-control bg-light" readonly style="height: auto; min-height: 38px; line-height: 38px;">
                                    <span id="shichenText">--</span>
                                    <span id="shichenElement" class="ms-2 badge">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-6 mb-4">
                        <div class="section-title">
                            <i class="bi bi-geo-alt"></i> 位置信息
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="province" class="form-label">省份</label>
                                <select class="form-select" id="province">
                                    <option value="">请选择</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">地域五行</label>
                                <div id="locationElementDisplay" class="form-control bg-light" style="height: auto; min-height: 38px; line-height: 38px;">
                                    <span id="locationElementText">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12 mb-4">
                        <div class="section-title collapsible-header" data-target="weatherCollapse">
                            <i class="bi bi-cloud-sun"></i> 天气信息
                        </div>
                        <div id="weatherCollapse" class="collapsible-content show">
                            <div class="row g-3 mt-2">
                                <div class="col-md-4 col-6">
                                    <label for="temperature" class="form-label">温度 (℃)</label>
                                    <input type="number" class="form-control" id="temperature" min="-40" max="50" placeholder="-40 ~ 50" value="22">
                                </div>
                                <div class="col-md-4 col-6">
                                    <label for="humidity" class="form-label">湿度 (%)</label>
                                    <input type="number" class="form-control" id="humidity" min="0" max="100" placeholder="0 ~ 100" value="60">
                                </div>
                                <div class="col-md-4 col-6">
                                    <label for="weather" class="form-label">天气状况</label>
                                    <select class="form-select" id="weather">
                                        <option value="">请选择</option>
                                        <option value="sunny" selected>晴天</option>
                                        <option value="cloudy">多云</option>
                                        <option value="overcast">阴天</option>
                                        <option value="lightRain">小雨</option>
                                        <option value="heavyRain">大雨</option>
                                        <option value="thunderstorm">雷雨</option>
                                        <option value="snow">雪</option>
                                        <option value="fog">雾</option>
                                        <option value="haze">霾</option>
                                    </select>
                                </div>
                                <div class="col-md-4 col-6">
                                    <label for="windDir" class="form-label">风向</label>
                                    <select class="form-select" id="windDir">
                                        <option value="">请选择</option>
                                        <option value="E">东风</option>
                                        <option value="SE">东南风</option>
                                        <option value="S">南风</option>
                                        <option value="SW">西南风</option>
                                        <option value="W">西风</option>
                                        <option value="NW">西北风</option>
                                        <option value="N">北风</option>
                                        <option value="NE" selected>东北风</option>
                                    </select>
                                </div>
                                <div class="col-md-4 col-6">
                                    <label for="windLevel" class="form-label">风级</label>
                                    <input type="number" class="form-control" id="windLevel" min="0" max="12" placeholder="0 ~ 12" value="2">
                                </div>
                                <div class="col-md-4 col-6">
                                    <label for="moonPhase" class="form-label">月相</label>
                                    <select class="form-select" id="moonPhase">
                                        <option value="">请选择</option>
                                        <option value="newMoon">新月</option>
                                        <option value="waxingCrescent">蛾眉月</option>
                                        <option value="firstQuarter">上弦月</option>
                                        <option value="waxingGibbous">盈凸月</option>
                                        <option value="fullMoon">满月</option>
                                        <option value="waningGibbous">亏凸月</option>
                                        <option value="lastQuarter">下弦月</option>
                                        <option value="waningCrescent">残月</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-lg-6 mb-4">
                        <div class="section-title">
                            <i class="bi bi-person"></i> 个人信息
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="zodiac" class="form-label">生肖</label>
                                <select class="form-select" id="zodiac">
                                    <option value="">请选择</option>
                                    <option value="rat">鼠</option>
                                    <option value="ox">牛</option>
                                    <option value="tiger">虎</option>
                                    <option value="rabbit">兔</option>
                                    <option value="dragon" selected>龙</option>
                                    <option value="snake">蛇</option>
                                    <option value="horse">马</option>
                                    <option value="goat">羊</option>
                                    <option value="monkey">猴</option>
                                    <option value="rooster">鸡</option>
                                    <option value="dog">狗</option>
                                    <option value="pig">猪</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="constellation" class="form-label">星座</label>
                                <select class="form-select" id="constellation">
                                    <option value="">请选择</option>
                                    <option value="aries">白羊座</option>
                                    <option value="taurus">金牛座</option>
                                    <option value="gemini">双子座</option>
                                    <option value="cancer">巨蟹座</option>
                                    <option value="leo">狮子座</option>
                                    <option value="virgo">处女座</option>
                                    <option value="libra" selected>天秤座</option>
                                    <option value="scorpio">天蝎座</option>
                                    <option value="sagittarius">射手座</option>
                                    <option value="capricorn">摩羯座</option>
                                    <option value="aquarius">水瓶座</option>
                                    <option value="pisces">双鱼座</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="mood" class="form-label">心情状态</label>
                                <select class="form-select" id="mood">
                                    <option value="">请选择</option>
                                    <option value="happy" selected>开心/兴奋</option>
                                    <option value="calm">平静/安宁</option>
                                    <option value="sad">忧郁/悲伤</option>
                                    <option value="angry">愤怒/焦躁</option>
                                    <option value="worried">忧虑/思虑</option>
                                    <option value="fearful">恐惧/不安</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="luckyNumber" class="form-label">幸运数字 (可选)</label>
                                <input type="number" class="form-control" id="luckyNumber" min="0" max="99" placeholder="0 ~ 99" value="8">
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-6 mb-4">
                        <div class="section-title collapsible-header collapsed" data-target="metaphysicsCollapse">
                            <i class="bi bi-stars"></i> 玄学参数（可选）
                        </div>
                        <div id="metaphysicsCollapse" class="collapsible-content">
                            <div class="row g-3 mt-2">
                                <div class="col-6">
                                    <label for="dreamType" class="form-label">梦境类型</label>
                                    <select class="form-select" id="dreamType">
                                        <option value="" selected>请选择</option>
                                        <option value="water">梦见水</option>
                                        <option value="fire">梦见火</option>
                                        <option value="wood">梦见树木</option>
                                        <option value="metal">梦见金属</option>
                                        <option value="earth">梦见土地</option>
                                        <option value="flying">梦见飞行</option>
                                        <option value="falling">梦见坠落</option>
                                        <option value="chasing">梦见追逐</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label for="intuitionNumber" class="form-label">直觉数字</label>
                                    <input type="number" class="form-control" id="intuitionNumber" min="0" max="99" placeholder="脑海中浮现的数字" value="">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button type="button" class="btn btn-generate text-white" id="generateBtn">
                        <i class="bi bi-magic"></i> 生成号码
                    </button>
                    <button type="button" class="btn btn-outline-secondary ms-2" id="resetBtn">
                        <i class="bi bi-arrow-clockwise"></i> 重置
                    </button>
                </div>
            </form>
        </div>
        
        <div class="result-container" id="resultContainer">
            <div id="loadingSpinner" class="loading-spinner"></div>
            <div id="resultContent" style="display: none;">
                <div class="result-label">前区号码</div>
                <div id="frontNumbers" class="mb-3"></div>
                <div class="result-label">后区号码</div>
                <div id="backNumbers" class="mb-3"></div>
                <div class="element-analysis" id="elementAnalysis"></div>
                <div class="mt-4">
                    <button class="btn btn-copy" id="copyBtn">
                        <i class="bi bi-clipboard"></i> 复制号码
                    </button>
                    <button class="btn btn-copy ms-2" id="regenerateBtn">
                        <i class="bi bi-arrow-repeat"></i> 重新生成
                    </button>
                </div>
            </div>
            <div id="placeholderText">
                <i class="bi bi-magic display-4 mb-3 d-block"></i>
                <p>填写参数后点击"生成号码"</p>
                <small class="opacity-75">参数越完整，推荐越精准</small>
            </div>
        </div>
        
        <div class="disclaimer">
            <p class="mb-0">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <strong>重要声明：</strong>本功能仅供娱乐参考，不构成任何投注建议。彩票中奖完全随机，任何号码生成方式都不能提高中奖概率。请理性购彩，量力而行。未满18周岁禁止购买彩票。
            </p>
        </div>
    </div>
    
    <div class="footer">
        <div class="container">
            <p>&copy; 2025 大乐透号码走势分析工具. 所有数据仅供参考，请理性购彩.</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="ai.js?v=2"></script>
</body>
