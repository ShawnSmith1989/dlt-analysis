<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生成 - NEXUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="hud-common.css?v=1">
    <style>
        .params-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .param-group {
            background: var(--bg-card);
            border: var(--border-subtle);
            padding: 20px;
        }
        
        .param-group-title {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .param-group-title i {
            font-size: 1rem;
        }
        
        .param-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .param-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .param-item.full-width {
            grid-column: span 2;
        }
        
        .param-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        
        .param-value {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        
        .param-display {
            background: var(--bg-deep);
            border: var(--border-subtle);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .result-section {
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.05), rgba(0, 136, 170, 0.02));
            border: 1px solid rgba(0, 212, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .result-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        }
        
        .result-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }
        
        .result-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-primary);
            margin-bottom: 5px;
        }
        
        .result-subtitle {
            font-family: var(--font-display);
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        
        .numbers-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }
        
        .numbers-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .numbers-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            width: 60px;
        }
        
        .result-ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: #4a5568;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: ballAppear 0.5s ease-out backwards;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .result-ball::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 7px;
            width: 12px;
            height: 7px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: rotate(-30deg);
        }
        
        .result-ball::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 7px;
            width: 8px;
            height: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            transform: rotate(30deg);
        }
        
        .result-ball.water {
            border-color: rgba(255, 255, 255, 0.4);
            background: linear-gradient(145deg, rgba(30, 136, 229, 0.65), rgba(21, 101, 192, 0.8));
            box-shadow: 0 3px 15px rgba(30, 136, 229, 0.5);
        }
        .result-ball.metal {
            border-color: rgba(255, 255, 255, 0.4);
            background: linear-gradient(145deg, rgba(120, 144, 156, 0.65), rgba(84, 110, 122, 0.8));
            box-shadow: 0 3px 15px rgba(120, 144, 156, 0.5);
        }
        .result-ball.fire {
            border-color: rgba(255, 255, 255, 0.4);
            background: linear-gradient(145deg, rgba(239, 83, 80, 0.65), rgba(198, 40, 40, 0.8));
            box-shadow: 0 3px 15px rgba(239, 83, 80, 0.5);
        }
        .result-ball.earth {
            border-color: rgba(255, 255, 255, 0.4);
            background: linear-gradient(145deg, rgba(255, 152, 0, 0.65), rgba(230, 81, 0, 0.8));
            box-shadow: 0 3px 15px rgba(255, 152, 0, 0.5);
        }
        .result-ball.wood {
            border-color: rgba(255, 255, 255, 0.4);
            background: linear-gradient(145deg, rgba(76, 175, 80, 0.65), rgba(46, 125, 50, 0.8));
            box-shadow: 0 3px 15px rgba(76, 175, 80, 0.5);
        }
        
        .result-ball.back {
            width: 40px;
            height: 40px;
            font-size: 0.95rem;
        }
        
        .result-ball.back::before {
            top: 3px;
            left: 5px;
            width: 10px;
            height: 6px;
        }
        
        .result-ball.back::after {
            bottom: 3px;
            right: 5px;
            width: 6px;
            height: 4px;
        }
        
        @keyframes ballAppear {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }
        
        .element-analysis {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        
        .element-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 15px;
            border: 1px solid;
            font-family: var(--font-display);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .element-tag .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .element-tag.water { border-color: #1e88e5; color: #1e88e5; }
        .element-tag.water .dot { background: #1e88e5; }
        .element-tag.metal { border-color: #78909c; color: #78909c; }
        .element-tag.metal .dot { background: #78909c; }
        .element-tag.fire { border-color: #ef5350; color: #ef5350; }
        .element-tag.fire .dot { background: #ef5350; }
        .element-tag.earth { border-color: #ff9800; color: #ff9800; }
        .element-tag.earth .dot { background: #ff9800; }
        .element-tag.wood { border-color: #4caf50; color: #4caf50; }
        .element-tag.wood .dot { background: #4caf50; }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            position: relative;
            z-index: 1;
        }
        
        .placeholder-content {
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        .placeholder-icon {
            font-size: 4rem;
            color: var(--accent-primary);
            opacity: 0.3;
            margin-bottom: 20px;
        }
        
        .placeholder-text {
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        
        .placeholder-hint {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 10px;
        }
        
        .disclaimer {
            background: rgba(255, 170, 0, 0.05);
            border: 1px solid rgba(255, 170, 0, 0.2);
            padding: 15px 20px;
            margin-top: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .disclaimer i {
            color: var(--status-warning);
            font-size: 1.2rem;
            margin-top: 2px;
        }
        
        .disclaimer-text {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .collapsible {
            cursor: pointer;
        }
        
        .collapsible-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .collapsible-header::after {
            content: '\F282';
            font-family: 'bootstrap-icons';
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform var(--transition-fast);
        }
        
        .collapsible.collapsed .collapsible-header::after {
            transform: rotate(-180deg);
        }
        
        .collapsible-content {
            max-height: 500px;
            overflow: hidden;
            transition: max-height var(--transition-normal);
        }
        
        .collapsible.collapsed .collapsible-content {
            max-height: 0;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 8, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-family: var(--font-display);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-primary);
            margin-top: 15px;
        }
        
        @media (max-width: 1000px) {
            .params-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 600px) {
            .param-row {
                grid-template-columns: 1fr;
            }
            
            .param-item.full-width {
                grid-column: span 1;
            }
            
            .result-ball {
                width: 40px;
                height: 40px;
                font-size: 0.95rem;
            }
            
            .result-ball.back {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }
            
            .numbers-row {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="hud-bg">
        <div class="grid-overlay"></div>
        <div class="scanline"></div>
        <div class="corner-decor top-left"></div>
        <div class="corner-decor top-right"></div>
        <div class="corner-decor bottom-left"></div>
        <div class="corner-decor bottom-right"></div>
    </div>
    
    <nav class="hud-nav">
        <div class="nav-brand">
            <span class="brand-icon">◇</span>
            <span class="brand-text">NEXUS</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">数据矩阵</a>
            <a href="chart.html" class="nav-link">图表系统</a>
            <a href="ai.html" class="nav-link active">AI生成</a>
            <a href="ai_alchemy.html" class="nav-link">核心系统</a>
        </div>
        <div class="nav-status">
            <span class="status-dot"></span>
            <span class="status-text">在线</span>
        </div>
    </nav>
    
    <main class="hud-main">
        <header class="hud-header">
            <h1 class="main-title">AI生成</h1>
            <p class="sub-title">基于五行理论的智能号码推荐</p>
        </header>
        
        <section class="hud-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="title-decor">[</span>
                    <span>参数配置</span>
                    <span class="title-decor">]</span>
                </div>
            </div>
            
            <form id="aiForm">
                <div class="params-grid">
                    <div class="param-group">
                        <div class="param-group-title">
                            <i class="bi bi-clock"></i> 时间信息
                        </div>
                        <div class="param-row">
                            <div class="param-item">
                                <label class="param-label">时间点（小时）</label>
                                <input type="number" class="hud-input" id="hour" min="0" max="23" value="">
                            </div>
                            <div class="param-item">
                                <label class="param-label">对应时辰</label>
                                <div class="param-display">
                                    <span id="shichenText">--</span>
                                    <span class="hud-badge" id="shichenElement">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="param-group">
                        <div class="param-group-title">
                            <i class="bi bi-geo-alt"></i> 位置信息
                        </div>
                        <div class="param-row">
                            <div class="param-item">
                                <label class="param-label">省份</label>
                                <select class="hud-select" id="province">
                                    <option value="">请选择</option>
                                </select>
                            </div>
                            <div class="param-item">
                                <label class="param-label">地域五行</label>
                                <div class="param-display">
                                    <span id="locationElementText">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="param-group collapsible" id="weatherGroup">
                        <div class="param-group-title collapsible-header">
                            <span><i class="bi bi-cloud-sun"></i> 天气信息</span>
                        </div>
                        <div class="collapsible-content">
                            <div class="param-row">
                                <div class="param-item">
                                    <label class="param-label">温度 (℃)</label>
                                    <input type="number" class="hud-input" id="temperature" min="-40" max="50" value="22">
                                </div>
                                <div class="param-item">
                                    <label class="param-label">湿度 (%)</label>
                                    <input type="number" class="hud-input" id="humidity" min="0" max="100" value="60">
                                </div>
                                <div class="param-item">
                                    <label class="param-label">天气状况</label>
                                    <select class="hud-select" id="weather">
                                        <option value="">请选择</option>
                                        <option value="sunny" selected>晴天</option>
                                        <option value="cloudy">多云</option>
                                        <option value="overcast">阴天</option>
                                        <option value="lightRain">小雨</option>
                                        <option value="heavyRain">大雨</option>
                                        <option value="thunderstorm">雷雨</option>
                                        <option value="snow">雪</option>
                                        <option value="fog">雾</option>
                                        <option value="haze">霾</option>
                                    </select>
                                </div>
                                <div class="param-item">
                                    <label class="param-label">风向</label>
                                    <select class="hud-select" id="windDir">
                                        <option value="">请选择</option>
                                        <option value="E">东风</option>
                                        <option value="SE">东南风</option>
                                        <option value="S">南风</option>
                                        <option value="SW">西南风</option>
                                        <option value="W">西风</option>
                                        <option value="NW">西北风</option>
                                        <option value="N">北风</option>
                                        <option value="NE" selected>东北风</option>
                                    </select>
                                </div>
                                <div class="param-item">
                                    <label class="param-label">风级</label>
                                    <input type="number" class="hud-input" id="windLevel" min="0" max="12" value="2">
                                </div>
                                <div class="param-item">
                                    <label class="param-label">月相</label>
                                    <select class="hud-select" id="moonPhase">
                                        <option value="">请选择</option>
                                        <option value="newMoon">新月</option>
                                        <option value="waxingCrescent">蛾眉月</option>
                                        <option value="firstQuarter">上弦月</option>
                                        <option value="waxingGibbous">盈凸月</option>
                                        <option value="fullMoon">满月</option>
                                        <option value="waningGibbous">亏凸月</option>
                                        <option value="lastQuarter">下弦月</option>
                                        <option value="waningCrescent">残月</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="param-group">
                        <div class="param-group-title">
                            <i class="bi bi-person"></i> 个人信息
                        </div>
                        <div class="param-row">
                            <div class="param-item">
                                <label class="param-label">生肖</label>
                                <select class="hud-select" id="zodiac">
                                    <option value="">请选择</option>
                                    <option value="rat">鼠</option>
                                    <option value="ox">牛</option>
                                    <option value="tiger">虎</option>
                                    <option value="rabbit">兔</option>
                                    <option value="dragon" selected>龙</option>
                                    <option value="snake">蛇</option>
                                    <option value="horse">马</option>
                                    <option value="goat">羊</option>
                                    <option value="monkey">猴</option>
                                    <option value="rooster">鸡</option>
                                    <option value="dog">狗</option>
                                    <option value="pig">猪</option>
                                </select>
                            </div>
                            <div class="param-item">
                                <label class="param-label">星座</label>
                                <select class="hud-select" id="constellation">
                                    <option value="">请选择</option>
                                    <option value="aries">白羊座</option>
                                    <option value="taurus">金牛座</option>
                                    <option value="gemini">双子座</option>
                                    <option value="cancer">巨蟹座</option>
                                    <option value="leo">狮子座</option>
                                    <option value="virgo">处女座</option>
                                    <option value="libra" selected>天秤座</option>
                                    <option value="scorpio">天蝎座</option>
                                    <option value="sagittarius">射手座</option>
                                    <option value="capricorn">摩羯座</option>
                                    <option value="aquarius">水瓶座</option>
                                    <option value="pisces">双鱼座</option>
                                </select>
                            </div>
                            <div class="param-item">
                                <label class="param-label">心情状态</label>
                                <select class="hud-select" id="mood">
                                    <option value="">请选择</option>
                                    <option value="happy" selected>开心/兴奋</option>
                                    <option value="calm">平静/安宁</option>
                                    <option value="sad">忧郁/悲伤</option>
                                    <option value="angry">愤怒/焦躁</option>
                                    <option value="worried">忧虑/思虑</option>
                                    <option value="fearful">恐惧/不安</option>
                                </select>
                            </div>
                            <div class="param-item">
                                <label class="param-label">幸运数字</label>
                                <input type="number" class="hud-input" id="luckyNumber" min="0" max="99" value="8">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="hud-toolbar" style="margin-top: 25px; justify-content: center;">
                    <button type="button" class="hud-btn primary" id="generateBtn">
                        <i class="bi bi-magic"></i> 生成号码
                    </button>
                    <button type="button" class="hud-btn" id="resetBtn">
                        <i class="bi bi-arrow-counterclockwise"></i> 重置
                    </button>
                </div>
            </form>
        </section>
        
        <section class="hud-panel result-section" id="resultSection">
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="loading-spinner"></div>
                <div class="loading-text">计算中...</div>
            </div>
            
            <div id="placeholderContent" class="placeholder-content">
                <div class="placeholder-icon">
                    <i class="bi bi-magic"></i>
                </div>
                <div class="placeholder-text">填写参数后点击生成</div>
                <div class="placeholder-hint">参数越完整，推荐越精准</div>
            </div>
            
            <div id="resultContent" style="display: none;">
                <div class="result-header">
                    <div class="result-title">生成结果</div>
                    <div class="result-subtitle">AI智能推荐号码</div>
                </div>
                
                <div class="numbers-display">
                    <div class="numbers-row">
                        <span class="numbers-label">前区</span>
                        <div id="frontNumbers"></div>
                    </div>
                    <div class="numbers-row">
                        <span class="numbers-label">后区</span>
                        <div id="backNumbers"></div>
                    </div>
                </div>
                
                <div class="element-analysis" id="elementAnalysis"></div>
                
                <div class="action-buttons">
                    <button class="hud-btn success" id="copyBtn">
                        <i class="bi bi-clipboard"></i> 复制
                    </button>
                    <button class="hud-btn primary" id="regenerateBtn">
                        <i class="bi bi-arrow-repeat"></i> 重新生成
                    </button>
                </div>
            </div>
        </section>
        
        <div class="disclaimer">
