<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>图表系统 - NEXUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="hud-common.css?v=1">
    <style>
        .chart-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .chart-wrapper {
            background: var(--bg-card);
            border: var(--border-subtle);
            padding: 20px;
            position: relative;
            min-height: 400px;
        }
        
        .chart-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        }
        
        .chart-wrapper canvas {
            max-height: 380px;
        }
        
        .element-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        
        .element-stat {
            background: var(--bg-panel);
            border: var(--border-subtle);
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .element-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .element-stat.water::before { background: var(--element-water); }
        .element-stat.metal::before { background: var(--element-metal); }
        .element-stat.fire::before { background: var(--element-fire); }
        .element-stat.earth::before { background: var(--element-earth); }
        .element-stat.wood::before { background: var(--element-wood); }
        
        .element-stat .element-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .element-stat.water .element-icon { color: var(--element-water); }
        .element-stat.metal .element-icon { color: var(--element-metal); }
        .element-stat.fire .element-icon { color: var(--element-fire); }
        .element-stat.earth .element-icon { color: var(--element-earth); }
        .element-stat.wood .element-icon { color: var(--element-wood); }
        
        .element-stat .element-value {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .element-stat .element-label {
            font-family: var(--font-display);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        .total-stat {
            background: var(--bg-panel);
            border: var(--border-subtle);
            padding: 20px;
            text-align: center;
        }
        
        .total-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: var(--accent-primary);
        }
        
        .total-stat .total-value {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-primary);
            text-shadow: var(--glow-soft);
        }
        
        .total-stat .total-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-dot.water { background: var(--element-water); box-shadow: 0 0 10px var(--element-water); }
        .legend-dot.metal { background: var(--element-metal); box-shadow: 0 0 10px var(--element-metal); }
        .legend-dot.fire { background: var(--element-fire); box-shadow: 0 0 10px var(--element-fire); }
        .legend-dot.earth { background: var(--element-earth); box-shadow: 0 0 10px var(--element-earth); }
        .legend-dot.wood { background: var(--element-wood); box-shadow: 0 0 10px var(--element-wood); }
        
        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 900px) {
            .element-stats {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 600px) {
            .element-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .chart-wrapper {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="hud-bg">
        <div class="grid-overlay"></div>
        <div class="scanline"></div>
        <div class="corner-decor top-left"></div>
        <div class="corner-decor top-right"></div>
        <div class="corner-decor bottom-left"></div>
        <div class="corner-decor bottom-right"></div>
    </div>
    
    <nav class="hud-nav">
        <div class="nav-brand">
            <span class="brand-icon">◇</span>
            <span class="brand-text">NEXUS</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">数据矩阵</a>
            <a href="chart.html" class="nav-link active">图表系统</a>
            <a href="ai_alchemy.html" class="nav-link">AI号码</a>
        </div>
        <div class="nav-status">
            <span class="status-dot"></span>
            <span class="status-text">在线</span>
        </div>
    </nav>
    
    <main class="hud-main">
        <section class="hud-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="title-decor">[</span>
                    <span>趋势图表</span>
                    <span class="title-decor">]</span>
                </div>
            </div>
            
            <div class="chart-wrapper">
                <canvas id="distributionChart"></canvas>
            </div>
            
            <div class="chart-legend">
                <div class="legend-item">
                    <span class="legend-dot water"></span>
                    <span>水 (1-7)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot metal"></span>
                    <span>金 (8-14)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot fire"></span>
                    <span>火 (15-21)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot earth"></span>
                    <span>土 (22-28)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot wood"></span>
                    <span>木 (29-35)</span>
                </div>
            </div>
        </section>
        
        <section class="hud-panel">
            <div class="panel-header" style="flex-wrap: wrap; gap: 15px;">
                <div class="panel-title">
                    <span class="title-decor">[</span>
                    <span>数据记录</span>
                    <span class="title-decor">]</span>
                </div>
                <div class="hud-search" style="flex: 0 0 auto;">
                    <div class="search-group">
                        <span class="search-label">期数</span>
                        <select class="hud-select" id="periodCount" style="width: 100px;">
                            <option value="20">20期</option>
                            <option value="30">30期</option>
                            <option value="50">50期</option>
                            <option value="100" selected>100期</option>
                            <option value="200">200期</option>
                            <option value="0">全部</option>
                        </select>
                    </div>
                    <button class="hud-btn primary" id="updateButton" style="padding: 8px 15px;">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
                <div class="table-info">
                    分析期数: <span class="total-count" id="totalPeriods">0</span>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="hud-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>期号</th>
                            <th>开奖日期</th>
                            <th>前区号码</th>
                            <th>后区号码</th>
                            <th>五行分布</th>
                            <th>和值</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
            
            <div class="hud-pagination" id="pagination">
            </div>
        </section>
        
        <footer class="hud-footer">
            <div class="footer-left">
                <span>NEXUS v2.0</span>
                <span class="separator">|</span>
                <span>图表系统已就绪</span>
            </div>
            <div class="footer-right">
                <span id="currentTime">00:00:00</span>
            </div>
        </footer>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js?v=4"></script>
    <script>
        /**
         * NEXUS 图表系统 - HUD风格
         * 
         * 开发记录:
         * - 2026-03-21: 基于原chart.html改造，适配HUD界面风格
         * - 使用Chart.js绘制五行分布趋势图
         */
        
        const elementAttributes = {
            1: '水', 2: '水', 3: '水', 4: '水', 5: '水', 6: '水', 7: '水',
            8: '金', 9: '金', 10: '金', 11: '金', 12: '金', 13: '金', 14: '金',
            15: '火', 16: '火', 17: '火', 18: '火', 19: '火', 20: '火', 21: '火',
            22: '土', 23: '土', 24: '土', 25: '土', 26: '土', 27: '土', 28: '土',
            29: '木', 30: '木', 31: '木', 32: '木', 33: '木', 34: '木', 35: '木'
        };
        
        const elementColors = {
            '水': '#00a8ff',
            '金': '#7a8fa8',
            '火': '#ff6b4a',
            '土': '#c4a35a',
            '木': '#00cc66'
        };
        
        let distributionChart = null;
        let currentData = [];
        let currentPage = 1;
        const itemsPerPage = 15;
        
        document.addEventListener('DOMContentLoaded', function() {
            initializeChart();
            loadTableData();
            bindEvents();
            startClock();
        });
        
        function initializeChart() {
            const ctx = document.getElementById('distributionChart').getContext('2d');
            const periodCount = parseInt(document.getElementById('periodCount').value);
            const chartData = prepareChartData(periodCount);
            
            if (distributionChart) {
                distributionChart.destroy();
            }
            
            distributionChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [
                        {
                            label: '水',
                            data: chartData.datasets.water,
                            borderColor: elementColors['水'],
                            backgroundColor: elementColors['水'] + '20',
                            fill: false,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        },
                        {
                            label: '金',
                            data: chartData.datasets.metal,
                            borderColor: elementColors['金'],
                            backgroundColor: elementColors['金'] + '20',
                            fill: false,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        },
                        {
                            label: '火',
                            data: chartData.datasets.fire,
                            borderColor: elementColors['火'],
                            backgroundColor: elementColors['火'] + '20',
                            fill: false,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        },
                        {
                            label: '土',
                            data: chartData.datasets.earth,
                            borderColor: elementColors['土'],
                            backgroundColor: elementColors['土'] + '20',
                            fill: false,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        },
                        {
                            label: '木',
                            data: chartData.datasets.wood,
                            borderColor: elementColors['木'],
                            backgroundColor: elementColors['木'] + '20',
                            fill: false,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(10, 15, 26, 0.95)',
                            titleColor: '#00d4ff',
                            bodyColor: '#e0f4ff',
                            borderColor: 'rgba(0, 212, 255, 0.3)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: {
                                color: 'rgba(0, 212, 255, 0.1)'
                            },
                            ticks: {
                                color: '#5a7a8a',
                                font: { family: 'Rajdhani' }
                            }
                        },
                        y: {
                            display: true,
                            min: 0,
                            grid: {
                                color: 'rgba(0, 212, 255, 0.1)'
                            },
                            ticks: {
                                color: '#5a7a8a',
                                font: { family: 'Rajdhani' },
                                stepSize: 1
                            }
                        }
                    }
                }
            });
            
            updateStatistics(chartData);
        }
        
        function prepareChartData(periodCount) {
            let data = [...lotteryData];
            
            if (periodCount > 0 && periodCount < data.length) {
                data = data.slice(0, periodCount);
            }
            
            data = data.reverse();
            
            const labels = [];
            const datasets = { water: [], metal: [], fire: [], earth: [], wood: [] };
            
            data.forEach(item => {
                labels.push(item.period);
                
                const counts = { '木': 0, '水': 0, '金': 0, '土': 0, '火': 0 };
                
                item.frontNumbers.forEach(num => {
                    const element = elementAttributes[num];
                    counts[element]++;
                });
                
                datasets.water.push(counts['水']);
                datasets.metal.push(counts['金']);
                datasets.fire.push(counts['火']);
                datasets.earth.push(counts['土']);
                datasets.wood.push(counts['木']);
            });
            
            return { labels, datasets };
        }
        
        function updateStatistics(chartData) {
            const totalPeriods = chartData.labels.length;
            document.getElementById('totalPeriods').textContent = totalPeriods;
        }
        
        function updateChart() {
            const periodCount = parseInt(document.getElementById('periodCount').value);
            const chartData = prepareChartData(periodCount);
            
            distributionChart.data.labels = chartData.labels;
            distributionChart.data.datasets[0].data = chartData.datasets.water;
            distributionChart.data.datasets[1].data = chartData.datasets.metal;
            distributionChart.data.datasets[2].data = chartData.datasets.fire;
            distributionChart.data.datasets[3].data = chartData.datasets.earth;
            distributionChart.data.datasets[4].data = chartData.datasets.wood;
            
            distributionChart.update();
            updateStatistics(chartData);
            loadTableData();
        }
        
        function loadTableData() {
            const periodCount = parseInt(document.getElementById('periodCount').value);
            let data = [...lotteryData];
            
            if (periodCount > 0 && periodCount < data.length) {
                data = data.slice(0, periodCount);
            }
            
            currentData = data;
            currentPage = 1;
            
            renderTable();
            renderPagination();
        }
        
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, currentData.length);
            
            for (let i = startIndex; i < endIndex; i++) {
                const item = currentData[i];
                const row = createTableRow(item);
                tableBody.appendChild(row);
            }
        }
        
        function createTableRow(item) {
            const row = document.createElement('tr');
            
            row.innerHTML = `<td style="font-family: var(--font-display); letter-spacing: 1px;">${item.period}</td>`;
            row.innerHTML += `<td>${item.date}</td>`;
            
            const frontBalls = item.frontNumbers.map(num => 
                `<span class="number-ball ${getElementClass(num)}">${formatNumber(num)}</span>`
            ).join('');
            row.innerHTML += `<td><div class="number-cell">${frontBalls}</div></td>`;
            
            const backBalls = item.backNumbers.map(num => 
                `<span class="number-ball back">${formatNumber(num)}</span>`
            ).join('');
            row.innerHTML += `<td><div class="number-cell">${backBalls}</div></td>`;
            
            const counts = { '木': 0, '水': 0, '金': 0, '土': 0, '火': 0 };
            item.frontNumbers.forEach(num => {
                const element = elementAttributes[num];
                counts[element]++;
            });
            
            let elementHtml = '';
            for (const [element, count] of Object.entries(counts)) {
                if (count > 0) {
                    elementHtml += `<span class="hud-badge" style="border-color: ${elementColors[element]}; color: ${elementColors[element]};">${element}${count}</span> `;
                }
            }
            row.innerHTML += `<td class="attr-cell">${elementHtml}</td>`;
            
            const sum = item.frontNumbers.reduce((a, b) => a + b, 0);
            row.innerHTML += `<td class="attr-cell">${sum}</td>`;
            
            return row;
        }
        
        function getElementClass(num) {
            const element = elementAttributes[num];
            switch(element) {
                case '水': return 'water';
                case '金': return 'metal';
                case '火': return 'fire';
                case '土': return 'earth';
                case '木': return 'wood';
                default: return '';
            }
        }
        
        function formatNumber(num) {
            return num < 10 ? `0${num}` : num.toString();
        }
        
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            const totalPages = Math.ceil(currentData.length / itemsPerPage);
            
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerHTML = '«';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                    renderPagination();
                }
            });
            pagination.appendChild(prevBtn);
            
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    renderTable();
                    renderPagination();
                });
                pagination.appendChild(pageBtn);
            }
            
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerHTML = '»';
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                    renderPagination();
                }
            });
            pagination.appendChild(nextBtn);
        }
        
        function startClock() {
            function updateTime() {
                const now = new Date();
                const timeStr = now.toTimeString().slice(0, 8);
                document.getElementById('currentTime').textContent = timeStr;
            }
            updateTime();
            setInterval(updateTime, 1000);
        }
        
        function bindEvents() {
            document.getElementById('periodCount').addEventListener('change', updateChart);
            document.getElementById('updateButton').addEventListener('click', updateChart);
        }
    </script>
</body>
</html>
