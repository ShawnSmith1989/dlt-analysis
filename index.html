<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据矩阵 - NEXUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="hud-common.css?v=1">
    <style>
        .matrix-chart-panel .hud-chart-container {
            height: 420px;
            padding: 20px;
        }
        
        .number-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: flex-start;
        }
        
        .attr-cell {
            font-family: var(--font-display);
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        
        .table-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        
        .table-info .total-count {
            color: var(--accent-primary);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 8, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-panel);
            border: var(--border-active);
            padding: 30px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        
        .modal-content::before,
        .modal-content::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(0, 212, 255, 0.4);
        }
        
        .modal-content::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }
        
        .modal-content::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
        }
        
        .modal-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color var(--transition-fast);
        }
        
        .modal-close:hover {
            color: var(--accent-primary);
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(0, 212, 255, 0.1);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            box-shadow: var(--glow-medium);
            transition: width 0.3s;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        @media (max-width: 900px) {
            .hud-table {
                font-size: 0.85rem;
            }
            
            .number-ball {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            
            .matrix-chart-panel .hud-chart-container {
                height: 360px;
            }
        }
        
        @media (max-width: 600px) {
            .matrix-chart-panel .hud-chart-container {
                height: 300px;
            }
            
            .hud-table th:nth-child(5),
            .hud-table th:nth-child(6),
            .hud-table th:nth-child(7),
            .hud-table th:nth-child(8),
            .hud-table td:nth-child(5),
            .hud-table td:nth-child(6),
            .hud-table td:nth-child(7),
            .hud-table td:nth-child(8) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="hud-bg">
        <div class="grid-overlay"></div>
        <div class="scanline"></div>
        <div class="corner-decor top-left"></div>
        <div class="corner-decor top-right"></div>
        <div class="corner-decor bottom-left"></div>
        <div class="corner-decor bottom-right"></div>
    </div>
    
    <nav class="hud-nav">
        <div class="nav-brand">
            <span class="brand-icon">◇</span>
            <span class="brand-text">NEXUS</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">数据矩阵</a>
            <a href="chart.html" class="nav-link">图表系统</a>
            <a href="ai_alchemy.html" class="nav-link">AI号码</a>
        </div>
        <div class="nav-status">
            <span class="status-dot"></span>
            <span class="status-text">在线</span>
        </div>
    </nav>
    
    <main class="hud-main">
        <section class="hud-panel matrix-chart-panel">
            <div class="hud-chart-container">
                <canvas id="elementChart"></canvas>
            </div>
            <div class="element-legend" style="display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap;">
                <div class="legend-item" style="display: flex; align-items: center; gap: 6px;">
                    <span style="width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(145deg, rgba(30, 136, 229, 0.65), rgba(21, 101, 192, 0.8));"></span>
                    <span style="font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;">水 (1-7)</span>
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 6px;">
                    <span style="width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(145deg, rgba(120, 144, 156, 0.65), rgba(84, 110, 122, 0.8));"></span>
                    <span style="font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;">金 (8-14)</span>
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 6px;">
                    <span style="width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(145deg, rgba(239, 83, 80, 0.65), rgba(198, 40, 40, 0.8));"></span>
                    <span style="font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;">火 (15-21)</span>
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 6px;">
                    <span style="width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(145deg, rgba(255, 152, 0, 0.65), rgba(230, 81, 0, 0.8));"></span>
                    <span style="font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;">土 (22-28)</span>
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 6px;">
                    <span style="width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(145deg, rgba(76, 175, 80, 0.65), rgba(46, 125, 50, 0.8));"></span>
                    <span style="font-family: var(--font-display); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;">木 (29-35)</span>
                </div>
            </div>
        </section>
        
        <section class="hud-panel">
            <div class="panel-header" style="flex-wrap: wrap; gap: 15px;">
                <div class="panel-title">
                    <span class="title-decor">[</span>
                    <span>数据记录</span>
                    <span class="title-decor">]</span>
                </div>
                <div class="hud-search" style="flex: 0 0 auto;">
                    <div class="search-group">
                        <span class="search-label">期数</span>
                        <select class="hud-select" id="chartPeriods" style="width: 90px;">
                            <option value="20">20期</option>
                            <option value="30">30期</option>
                            <option value="50">50期</option>
                            <option value="100" selected>100期</option>
                            <option value="0">全部</option>
                        </select>
                    </div>
                    <div class="search-group">
                        <span class="search-label">期号</span>
                        <input type="text" class="hud-input" id="periodStart" placeholder="起始" style="width: 70px;">
                        <span class="search-label">-</span>
                        <input type="text" class="hud-input" id="periodEnd" placeholder="结束" style="width: 70px;">
                    </div>
                    <div class="search-group">
                        <span class="search-label">号码</span>
                        <input type="text" class="hud-input" id="filterNumber" placeholder="号码" style="width: 50px;">
                    </div>
                    <button class="hud-btn primary" id="filterButton" style="padding: 8px 15px;">
                        <i class="bi bi-funnel"></i> 筛选
                    </button>
                    <button class="hud-btn" id="resetFilter" style="padding: 8px 15px;">
                        <i class="bi bi-arrow-counterclockwise"></i> 重置
                    </button>
                    <button class="hud-btn success" id="updateDataBtn" style="padding: 8px 15px;">
                        <i class="bi bi-cloud-download"></i> 更新
                    </button>
                </div>
                <div class="table-info">
                    总记录: <span class="total-count" id="totalCount">0</span>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="hud-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>期号</th>
                            <th>开奖日期</th>
                            <th>前区号码</th>
                            <th>后区号码</th>
                            <th>号码属性</th>
                            <th>奇偶比</th>
                            <th>质合比</th>
                            <th>和值</th>
                            <th>跨度</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
            
            <div class="hud-pagination" id="pagination">
            </div>
        </section>
        
        <footer class="hud-footer">
            <div class="footer-left">
                <span>NEXUS v2.0</span>
                <span class="separator">|</span>
                <span>数据矩阵已加载</span>
            </div>
            <div class="footer-right">
                <span id="currentTime">00:00:00</span>
            </div>
        </footer>
    </main>
    
    <div class="modal-overlay" id="updateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">
                    <i class="bi bi-cloud-download"></i> 更新数据
                </h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="updateStatus" style="color: var(--text-secondary);">准备更新最新开奖数据...</p>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
                <div id="updateResult"></div>
            </div>
            <div class="modal-footer">
                <button class="hud-btn" id="cancelUpdate">取消</button>
                <button class="hud-btn primary" id="confirmUpdate">
                    <i class="bi bi-cloud-download"></i> 确认更新
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js?v=4"></script>
    <script src="script-hud.js?v=2"></script>
</body>
</html>
