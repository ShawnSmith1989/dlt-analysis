<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>数据更新测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">数据更新测试</h1>
        
        <div class="card mb-4">
            <div class="card-header">
                <h5>测试数据更新功能</h5>
            </div>
            <div class="card-body">
                <p>点击下面的按钮测试数据更新功能：</p>
                
                <div class="btn-group" role="group">
                    <button id="updateLatest" class="btn btn-primary me-2">
                        <i class="bi bi-cloud-download"></i> 更新最新数据
                    </button>
                    <button id="updateMissing" class="btn btn-success">
                        <i class="bi bi-search"></i> 补齐缺失数据
                    </button>
                </div>
                
                <div id="updateResult" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5>当前数据状态</h5>
            </div>
            <div class="card-body">
                <div id="dataStatus">正在检查数据状态...</div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面加载时检查数据状态
        document.addEventListener('DOMContentLoaded', function() {
            checkDataStatus();
            
            // 添加事件监听器
            document.getElementById('updateLatest').addEventListener('click', function() {
                updateData('update');
            });
            
            document.getElementById('updateMissing').addEventListener('click', function() {
                updateData('update_missing');
            });
        });
        
        // 检查数据状态
        function checkDataStatus() {
            // 加载数据文件
            const script = document.createElement('script');
            script.src = `data.js?t=${Date.now()}`;
            script.onload = function() {
                if (typeof lotteryData !== 'undefined') {
                    const dataCount = lotteryData.length;
                    const latestDate = lotteryData.length > 0 ? lotteryData[0].date : '无数据';
                    const latestPeriod = lotteryData.length > 0 ? lotteryData[0].period : '无数据';
                    
                    document.getElementById('dataStatus').innerHTML = `
                        <p>当前数据记录数：<strong>${dataCount}</strong></p>
                        <p>最新开奖日期：<strong>${latestDate}</strong></p>
                        <p>最新开奖期号：<strong>${latestPeriod}</strong></p>
                    `;
                } else {
                    document.getElementById('dataStatus').innerHTML = '<p class="text-danger">数据加载失败</p>';
                }
            };
            script.onerror = function() {
                document.getElementById('dataStatus').innerHTML = '<p class="text-danger">无法加载数据文件</p>';
            };
            document.head.appendChild(script);
        }
        
        // 更新数据
        function updateData(action) {
            const buttonId = action === 'update' ? 'updateLatest' : 'updateMissing';
            const button = document.getElementById(buttonId);
            
            // 禁用按钮
            button.disabled = true;
            button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 更新中...';
            
            document.getElementById('updateResult').innerHTML = '<div class="alert alert-info">正在更新数据，请稍候...</div>';
            
            // 发送AJAX请求到服务器
            fetch(window.location.origin + '/update_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ action: action })
            })
            .then(response => response.json())
            .then(data => {
                // 重新启用按钮
                button.disabled = false;
                button.innerHTML = action === 'update' ? 
                    '<i class="bi bi-cloud-download"></i> 更新最新数据' : 
                    '<i class="bi bi-search"></i> 补齐缺失数据';
                
                if (data.success) {
                    // 更新成功
                    document.getElementById('updateResult').innerHTML = `
                        <div class="alert alert-success">
                            <h6><i class="bi bi-check-circle-fill"></i> ${data.message}</h6>
                            <pre class="mt-2"><code>${data.output || '无输出信息'}</code></pre>
                            <div class="mt-3">
                                <button class="btn btn-success" onclick="location.reload(true)">
                                    <i class="bi bi-arrow-clockwise"></i> 刷新页面
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    // 更新失败
                    document.getElementById('updateResult').innerHTML = `
                        <div class="alert alert-danger">
                            <h6><i class="bi bi-exclamation-triangle-fill"></i> ${data.message}</h6>
                            ${data.error ? `<p class="mb-2"><small>错误详情: ${data.error}</small></p>` : ''}
                        </div>
                    `;
                }
            })
            .catch(error => {
                // 重新启用按钮
                button.disabled = false;
                button.innerHTML = action === 'update' ? 
                    '<i class="bi bi-cloud-download"></i> 更新最新数据' : 
                    '<i class="bi bi-search"></i> 补齐缺失数据';
                
                // 显示错误信息
                document.getElementById('updateResult').innerHTML = `
                    <div class="alert alert-danger">
                        <h6><i class="bi bi-exclamation-triangle-fill"></i> 请求失败</h6>
                        <p class="mb-2">无法连接到服务器进行数据更新: ${error.message}</p>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
