<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>数据更新测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">数据更新测试</h1>
        
        <div class="card">
            <div class="card-header">
                <h5>测试数据更新功能</h5>
            </div>
            <div class="card-body">
                <p>点击下面的按钮测试数据更新功能：</p>
                <button id="updateData" class="btn btn-primary">
                    <i class="bi bi-cloud-download"></i> 更新数据
                </button>
                
                <div id="updateResult" class="mt-3"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 添加事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('updateData').addEventListener('click', function() {
                // 禁用按钮
                document.getElementById('updateData').disabled = true;
                document.getElementById('updateResult').innerHTML = '<div class="alert alert-info">正在更新数据...</div>';
                
                // 发送AJAX请求到服务器
                fetch(window.location.origin + '/update_data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action: 'update' })
                })
                .then(response => response.json())
                .then(data => {
                    // 重新启用按钮
                    document.getElementById('updateData').disabled = false;
                    
                    if (data.success) {
                        // 更新成功
                        document.getElementById('updateResult').innerHTML = `
                            <div class="alert alert-success">
                                <h6><i class="bi bi-check-circle-fill"></i> 数据更新成功</h6>
                                <p class="mb-2">${data.message}</p>
                                <pre class="mt-2"><code>${data.output || '无输出信息'}</code></pre>
                            </div>
                        `;
                    } else {
                        // 更新失败
                        document.getElementById('updateResult').innerHTML = `
                            <div class="alert alert-danger">
                                <h6><i class="bi bi-exclamation-triangle-fill"></i> 数据更新失败</h6>
                                <p class="mb-2">${data.message}</p>
                                ${data.error ? `<p class="mb-2"><small>错误详情: ${data.error}</small></p>` : ''}
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    // 重新启用按钮
                    document.getElementById('updateData').disabled = false;
                    
                    // 显示错误信息
                    document.getElementById('updateResult').innerHTML = `
                        <div class="alert alert-danger">
                            <h6><i class="bi bi-exclamation-triangle-fill"></i> 请求失败</h6>
                            <p class="mb-2">无法连接到服务器进行数据更新: ${error.message}</p>
                        </div>
                    `;
                });
            });
        });
    </script>
</body>
</html>
